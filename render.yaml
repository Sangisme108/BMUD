services:
  - type: web
    name: bmud-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm run migrate && npm start
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: TRUST_PROXY_HOPS
        value: "1"
      - key: CORS_ORIGINS
        sync: false
      - key: DB_HOST
        sync: false
      - key: DB_PORT
        sync: false
      - key: DB_SSL
        sync: false
      - key: DB_USER
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: DB_NAME
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: OTP_SECRET
        sync: false
      - key: EMAIL_USER
        sync: false
      - key: EMAIL_PASS
        sync: false
      - key: EMAIL_CONNECTION_TIMEOUT_MS
        value: "8000"
      - key: EMAIL_GREETING_TIMEOUT_MS
        value: "8000"
      - key: EMAIL_SOCKET_TIMEOUT_MS
        value: "10000"
      - key: EMAIL_SEND_TIMEOUT_MS
        value: "10000"
